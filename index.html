<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>English Week Challenge | Игра для урока</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #8EC5FC 0%, #E0C3FC 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
        }

        /* Карточка приложения - стиль iOS/Android */
        .app-container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 56px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255,255,255,0.3);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Головной экран */
        .game-header {
            background: white;
            padding: 24px 28px 16px 28px;
            border-bottom: 1px solid #f0f0f0;
        }

        .title-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #1E2A5E, #556B9D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .badge {
            background: #f2eafc;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #6c4ab6;
        }

        .sub {
            color: #6c6f78;
            font-size: 15px;
            font-weight: 500;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Секция с прогрессом */
        .stats-bar {
            background: white;
            padding: 8px 28px 12px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #efefef;
        }

        .score-box, .streak-box {
            background: #f9f9ff;
            padding: 8px 16px;
            border-radius: 48px;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .score-box span:first-child, .streak-box span:first-child {
            color: #8f8fa3;
            font-size: 13px;
            margin-right: 6px;
        }

        .score-value, .streak-value {
            font-size: 22px;
            font-weight: 800;
            color: #2D3E6E;
        }

        /* Основной игровой блок */
        .game-area {
            padding: 24px 28px 32px;
            background: #ffffff;
        }

        .question-card {
            background: #F5F7FE;
            border-radius: 48px;
            padding: 36px 20px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8), 0 8px 20px rgba(0,0,0,0.02);
        }

        .question-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8A7BC8;
            margin-bottom: 12px;
        }

        .question-word {
            font-size: 44px;
            font-weight: 800;
            color: #1E293B;
            word-break: break-word;
            background: white;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 80px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        /* Блок с вариантами ответа (сетка 2x2) */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 20px 0 24px;
        }

        .option-btn {
            background: #FFFFFF;
            border: none;
            padding: 18px 8px;
            border-radius: 32px;
            font-size: 18px;
            font-weight: 600;
            color: #1F2A44;
            text-align: center;
            transition: all 0.15s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04), 0 0 0 1px #E9E9F0;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: -0.2px;
        }

        .option-btn:active {
            transform: scale(0.96);
            background: #F1F3FE;
        }

        /* Состояние правильного ответа / ошибки (динамические через js) */
        .option-correct {
            background: #CCE6D4 !important;
            border: 1px solid #2C7A47 !important;
            color: #14532d;
            box-shadow: 0 0 0 1px #2C7A47;
        }

        .option-wrong {
            background: #FFDFDF !important;
            border: 1px solid #C73E3E !important;
            color: #9B1C1C;
            text-decoration: line-through;
        }

        .disabled-btn {
            pointer-events: none;
            opacity: 0.8;
        }

        /* Кнопка следующего вопроса */
        .next-btn {
            background: #2D3E6E;
            width: 100%;
            border: none;
            padding: 18px 0;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            transition: 0.2s;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(45,62,110,0.25);
        }

        .next-btn:active {
            transform: scale(0.97);
            background: #1F2F54;
        }

        .next-btn:disabled {
            background: #b7bfd6;
            transform: none;
            cursor: default;
            box-shadow: none;
        }

        /* Сообщение результата */
        .message-area {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
            font-weight: 500;
            min-height: 48px;
            color: #3a4b7a;
        }

        /* Кнопка сброса/рестарт */
        .reset-btn {
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #7E6CB4;
            margin-top: 16px;
            justify-content: center;
            cursor: pointer;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            transition: background 0.2s;
        }

        .reset-btn:active {
            background: #f0eefa;
        }

        footer {
            background: #FBFBFD;
            padding: 14px 28px 24px;
            text-align: center;
            font-size: 12px;
            color: #a1a5bb;
            border-top: 1px solid #f0f0f0;
        }

        @media (max-width: 480px) {
            .app-container {
                border-radius: 40px;
            }
            .question-word {
                font-size: 34px;
            }
            .options-grid {
                gap: 12px;
            }
            .option-btn {
                padding: 14px 6px;
                font-size: 16px;
            }
            .game-area {
                padding: 20px 20px 28px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="game-header">
        <div class="title-section">
            <h1>🗓️ WeekMaster</h1>
            <div class="badge">Дни недели · A1</div>
        </div>
        <div class="sub">
            <span>⭐</span> Урок английского: выбери правильный перевод
        </div>
    </div>
    <div class="stats-bar">
        <div class="score-box">
            <span>🏆 Счёт</span>
            <span class="score-value" id="scoreValue">0</span>
        </div>
        <div class="streak-box">
            <span>🔥 Серия</span>
            <span class="streak-value" id="streakValue">0</span>
        </div>
    </div>
    <div class="game-area">
        <div class="question-card">
            <div class="question-label">🔊 КАК ПЕРЕВЕСТИ?</div>
            <div class="question-word" id="questionWord">Monday</div>
        </div>
        <div class="options-grid" id="optionsContainer">
            <!-- кнопки вариантов динамические -->
        </div>
        <button class="next-btn" id="nextBtn">➡️ Следующий вопрос</button>
        <div class="message-area" id="messageArea"></div>
        <button class="reset-btn" id="resetGameBtn">⟳ Начать заново</button>
    </div>
    <footer>
        🧠 Изучаем дни недели | Переведи правильно
    </footer>
</div>

<script>
    // ---------- БАЗА ДАННЫХ: ДНИ НЕДЕЛИ (англ + русский перевод)
    const DAYS_DATA = [
        { eng: "Monday", rus: "Понедельник" },
        { eng: "Tuesday", rus: "Вторник" },
        { eng: "Wednesday", rus: "Среда" },
        { eng: "Thursday", rus: "Четверг" },
        { eng: "Friday", rus: "Пятница" },
        { eng: "Saturday", rus: "Суббота" },
        { eng: "Sunday", rus: "Воскресенье" }
    ];

    // ---------- СОСТОЯНИЕ ИГРЫ ----------
    let currentQuestionIndex = 0;          // индекс текущего дня в DAYS_DATA
    let currentOptions = [];               // массив объектов { rus, isCorrect }
    let score = 0;
    let streak = 0;
    let answerLocked = false;               // заблокированы ли кнопки (после ответа)
    let currentCorrectAnswerRus = "";      // русское значение правильного ответа для текущего вопроса

    // DOM элементы
    const questionWordEl = document.getElementById("questionWord");
    const optionsContainer = document.getElementById("optionsContainer");
    const nextBtn = document.getElementById("nextBtn");
    const messageArea = document.getElementById("messageArea");
    const scoreValueEl = document.getElementById("scoreValue");
    const streakValueEl = document.getElementById("streakValue");
    const resetBtn = document.getElementById("resetGameBtn");

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function updateUIStats() {
        scoreValueEl.innerText = score;
        streakValueEl.innerText = streak;
    }

    // Генерация 4 вариантов: 1 правильный + 3 случайных разных (уникальных, не равных правильному)
    function generateOptions(correctRus, currentEngWord) {
        // Получаем список всех русских переводов, кроме правильного
        const otherTranslations = DAYS_DATA.filter(day => day.rus !== correctRus).map(day => day.rus);
        // Перемешиваем и берем первых 3 уникальных
        const shuffledOthers = [...otherTranslations];
        for (let i = shuffledOthers.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledOthers[i], shuffledOthers[j]] = [shuffledOthers[j], shuffledOthers[i]];
        }
        const randomOptions = shuffledOthers.slice(0, 3);
        let opts = [...randomOptions, correctRus];
        // Финальное перемешивание вариантов
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        // Возвращаем массив объектов с информацией о правильности
        return opts.map(optionText => ({
            rus: optionText,
            isCorrect: optionText === correctRus
        }));
    }

    // Загрузить новый вопрос (по индексу currentQuestionIndex)
    function loadQuestion() {
        // Снимаем блокировку ответов
        answerLocked = false;
        // Убираем сообщение
        messageArea.innerHTML = "";
        // Получаем текущий день
        const currentDay = DAYS_DATA[currentQuestionIndex];
        const engWord = currentDay.eng;
        const correctRusWord = currentDay.rus;
        currentCorrectAnswerRus = correctRusWord;
        questionWordEl.innerText = engWord;
        // Генерируем варианты на основе правильного перевода
        currentOptions = generateOptions(correctRusWord, engWord);
        // Отрисовываем кнопки
        renderOptionsButtons(currentOptions);
        // Активируем следующую кнопку? Она пока disabled до ответа, но в начале активна? 
        // Логика: nextBtn должен становиться активным только ПОСЛЕ того как пользователь дал ответ.
        // Изначально при новом вопросе nextBtn выключен
        nextBtn.disabled = true;
        nextBtn.style.opacity = "0.6";
        // Убираем классы disabled с кнопок-вариантов (если были)
        const allOptBtns = document.querySelectorAll('.option-btn');
        allOptBtns.forEach(btn => {
            btn.classList.remove('disabled-btn');
            btn.disabled = false;
            // очищаем стили правильных/неправильных классов (чтобы не было подсветки от предыдущего вопроса)
            btn.classList.remove('option-correct', 'option-wrong');
        });
    }

    // Отрисовка вариантов (кнопки)
    function renderOptionsButtons(options) {
        optionsContainer.innerHTML = "";
        options.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.innerText = opt.rus;
            btn.classList.add("option-btn");
            btn.setAttribute("data-opt-index", idx);
            btn.addEventListener("click", () => handleAnswer(opt.rus, btn));
            optionsContainer.appendChild(btn);
        });
    }

    // Обработка ответа пользователя
    function handleAnswer(selectedRus, targetButton) {
        if (answerLocked) {
            // уже дан ответ на текущий вопрос
            return;
        }
        // Получаем правильный перевод для текущего английского слова
        const isAnswerCorrect = (selectedRus === currentCorrectAnswerRus);
        
        // Блокируем все кнопки вариантов (чтобы нельзя было выбрать несколько)
        answerLocked = true;
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(btn => {
            btn.disabled = true;
            btn.classList.add('disabled-btn');
        });
        
        // Подсветка правильного и неправильного ответов (пользовательский фидбек)
        allBtns.forEach(btn => {
            const btnText = btn.innerText;
            if (btnText === currentCorrectAnswerRus) {
                btn.classList.add('option-correct');
            }
            if (btnText === selectedRus && btnText !== currentCorrectAnswerRus) {
                btn.classList.add('option-wrong');
            }
            if (btnText === selectedRus && btnText === currentCorrectAnswerRus) {
                btn.classList.add('option-correct');
            }
        });
        
        // Обновляем счёт и серию
        if (isAnswerCorrect) {
            // Правильный ответ
            score += 10;
            streak += 1;
            messageArea.innerHTML = "✅ Отлично! +10 очков, серия растёт!";
            // Дополнительная анимация: вспышка на счёте (для веселья)
            const scoreSpan = document.getElementById("scoreValue");
            scoreSpan.style.transform = "scale(1.1)";
            setTimeout(() => { scoreSpan.style.transform = "scale(1)"; }, 150);
        } else {
            // Неправильный ответ: серия обнуляется, очки не меняем (можно было бы штраф, но оставим только без штрафа)
            streak = 0;
            messageArea.innerHTML = `❌ Неправильно! Правильный ответ: "${currentCorrectAnswerRus}". Серия сброшена.`;
            // анимация ошибки
            const streakSpan = document.getElementById("streakValue");
            streakSpan.style.transform = "scale(1.1)";
            setTimeout(() => { streakSpan.style.transform = "scale(1)"; }, 150);
        }
        
        // убедимся, что очки и серия не уходят в минус
        if (streak < 0) streak = 0;
        updateUIStats();
        
        // Активируем кнопку "Следующий вопрос"
        nextBtn.disabled = false;
        nextBtn.style.opacity = "1";
    }
    
    // Переход к следующему вопросу (циклический сдвиг по дням)
    function nextQuestion() {
        if (!answerLocked) {
            // если пользователь не ответил, не даём перейти (nextBtn disabled в любом случае, но на всякий случай)
            return;
        }
        // Переключаем индекс: следующий день недели, если конец массива -> возвращаемся к началу
        currentQuestionIndex = (currentQuestionIndex + 1) % DAYS_DATA.length;
        // Загружаем новый вопрос
        loadQuestion();
    }
    
    // Полный сброс игры (сброс очков, серии, начинаем с первого дня недели)
    function resetGame() {
        // обнуляем состояние
        score = 0;
        streak = 0;
        currentQuestionIndex = 0;
        updateUIStats();
        // сброс сообщения
        messageArea.innerHTML = "";
        // если был заблокирован ответ, сбрасываем блокировку
        answerLocked = false;
        // перезагружаем текущий вопрос (первый день недели — Monday)
        loadQuestion();
        // Дополнительно: анимация сброса
        const resetMsg = document.createElement('div');
        messageArea.innerHTML = "🔄 Игра перезапущена! Начни новый раунд ✨";
        setTimeout(() => {
            if (messageArea.innerHTML.includes("перезапущена")) {
                // если через 2 секунды сообщение не затерто следующим действием, сотрем его плавно, но loadQuestion уже уберет, но предохраним
                if (!answerLocked) messageArea.innerHTML = "";
            }
        }, 1800);
    }
    
    // Добавляем ивент на кнопку сброса
    resetBtn.addEventListener("click", () => {
        resetGame();
    });
    
    // Назначаем обработчик для nextBtn
    nextBtn.addEventListener("click", () => {
        if (!nextBtn.disabled) {
            nextQuestion();
        }
    });
    
    // инициализация игры (загрузка первого вопроса + сброс всего)
    function initGame() {
        score = 0;
        streak = 0;
        currentQuestionIndex = 0;
        updateUIStats();
        loadQuestion();
    }
    
    initGame();
    
    // красивый эффект при клике на кнопках - дополнительная тактильность (уже есть анимация active в css)
    // предотвращаем случайную отправку формы (нет форм)
</script>
</body>
</html>
